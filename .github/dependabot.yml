version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pub"
    directories:
      - "/"
      - "/pkgs/*"
    schedule:
      interval: "monthly"
    ignore:
      # melos 7 requires migrating to pub workspaces; pinned to 6.x until then.
      - dependency-name: "melos"
        update-types: ["version-update:semver-major"]
